<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note-Vote Login</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>
  <div id="login-page-container">
    <h1 id="page-title">Note-Vote</h1>
    
    <div id="auth-card">
      <div id="login-section">
        <div class="tab-button active" onclick="switchTab('login')">Log In</div>
        
        <h2>Log in</h2>
        <form class="auth-form" action="loginHistory.html">
          <div class="form-group">
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" name="email" placeholder="Email address" />
          </div>
          
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" placeholder="Password" />
          </div>
          
          <button type="submit" class="primary-btn">Log In</button>
        </form>
        
        <button class="secondary-btn" onclick="switchTab('signup')">Register</button>
      </div>
      
      <div id="signup-section" style="display: none;">
        <div class="tab-button active" onclick="switchTab('signup')">Sign Up</div>
        
        <h2>Sign up</h2>
        <form class="auth-form">
          <div class="form-group">
            <label for="signup-email">Email address</label>
            <input type="email" id="signup-email" name="email" placeholder="Email address" />
          </div>
          
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" name="password" placeholder="Password" />
          </div>
          
          <div class="form-group">
            <label for="invite-code">Invite Code</label>
            <input type="text" id="invite-code" name="invite-code" placeholder="Invite Code" />
          </div>
          
          <button type="submit" class="primary-btn">Sign Up</button>
        </form>
        
        <button class="secondary-btn" onclick="switchTab('login')">Log In</button>
      </div>
    </div>
  </div>
  
  <script>
    function switchTab(tab) {
      const loginSection = document.getElementById('login-section');
      const signupSection = document.getElementById('signup-section');
      
      if (tab === 'login') {
        loginSection.style.display = 'block';
        signupSection.style.display = 'none';
      } else {
        loginSection.style.display = 'none';
        signupSection.style.display = 'block';
      }
    }
  </script>
</body>
</html>
