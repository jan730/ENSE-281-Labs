<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note-Vote Sign Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-light">

  <div class="container">
    <h1 class="text-center mt-5 mb-4">Note‑Vote</h1>

    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card p-4 shadow-sm">
          <h2 class="text-center mb-4">Sign Up</h2>

          <form>
            <div class="mb-3">
              <label for="signup-email" class="form-label">Email address</label>
              <input type="email" id="signup-email" name="email" class="form-control" />
            </div>

            <div class="mb-3">
              <label for="signup-password" class="form-label">Password</label>
              <input type="password" id="signup-password" name="password" class="form-control" />
            </div>

            <div class="mb-3">
              <label for="invite-code" class="form-label">Invite Code</label>
              <input type="text" id="invite-code" name="invite-code" class="form-control" />
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
          </form>

          <p class="text-center mt-3 mb-0">
            Already have an account?
            <a href="login.html">Log In</a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
