<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Note-Vote</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>

  <div class="nv-history-wrapper">

    <div class="nv-history-header">
      <span>Logged in as: example@email.com</span>
      <div class="nv-history-actions">
        <button class="btn btn-outline-secondary btn-sm">Settings</button>
        <a href="login.html" class="btn btn-outline-secondary btn-sm">Log Out</a>
      </div>
    </div>

    <div class="nv-notes-list">

      <div class="nv-note-row">
        <span>this is a note you upvoted</span>
        <div class="nv-note-votes">
          <span class="nv-arrow nv-arrow-up nv-arrow-active">▲</span>
          <span class="nv-arrow nv-arrow-down">▼</span>
          <span class="nv-score">1</span>
        </div>
      </div>

      <div class="nv-note-row">
        <span>this is a note you downvoted</span>
        <div class="nv-note-votes">
          <span class="nv-arrow nv-arrow-up">▲</span>
          <span class="nv-arrow nv-arrow-down nv-arrow-active-down">▼</span>
          <span class="nv-score">-1</span>
        </div>
      </div>

      <div class="nv-note-row">
        <span>this is a note you haven't voted on yet</span>
        <div class="nv-note-votes">
          <span class="nv-arrow nv-arrow-up">▲</span>
          <span class="nv-arrow nv-arrow-down">▼</span>
          <span class="nv-score">0</span>
        </div>
      </div>

      <div class="nv-note-row">
        <span>this is a note you submitted</span>
        <div class="nv-note-votes">
          <span class="nv-score">0</span>
        </div>
      </div>

    </div>

    <div class="nv-add-note-row">
      <input type="text" class="form-control nv-add-input" placeholder="Enter a new note here" />
      <button class="btn btn-primary nv-add-button">Add</button>
    </div>

  </div>

</body>
</html>
