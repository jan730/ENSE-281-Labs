<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Note‑Vote Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-light">
    <div class="container">
      <span class="navbar-brand">Note‑Vote</span>

      <div class="ms-auto">
        <span class="me-3 text-muted">Logged in as: example@email.com</span>
        <a class="btn btn-outline-secondary me-2" href="#">Settings</a>
        <a class="btn btn-outline-secondary" href="login.html">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="card p-4 shadow-sm">

      <!-- Add Note -->
      <div class="input-group mb-4">
        <input type="text" id="note-vote-new-note" class="form-control" placeholder="Enter a new note here" />
        <button id="note-vote-add" class="btn btn-primary">Add</button>
      </div>

      <!-- Notes List -->
      <div class="list-group">

        <div class="list-group-item d-flex justify-content-between align-items-center">
          <span>this is a note you upvoted</span>
          <div>
            <button class="btn btn-outline-secondary btn-sm">↑</button>
            <button class="btn btn-outline-secondary btn-sm">↓</button>
            <span class="ms-2 fw-bold">1</span>
          </div>
        </div>

        <div class="list-group-item d-flex justify-content-between align-items-center">
          <span>this is a note you downvoted</span>
          <div>
            <button class="btn btn-outline-secondary btn-sm">↑</button>
            <button class="btn btn-outline-secondary btn-sm">↓</button>
            <span class="ms-2 fw-bold">-1</span>
          </div>
        </div>

        <div class="list-group-item d-flex justify-content-between align-items-center">
          <span>this is a note you haven't voted</span>
          <div>
            <button class="btn btn-outline-secondary btn-sm">↑</button>
            <button class="btn btn-outline-secondary btn-sm">↓</button>
            <span class="ms-2 fw-bold">0</span>
          </div>
        </div>

        <div class="list-group-item d-flex justify-content-between align-items-center">
          <span>this is a note you submitted</span>
          <span class="fw-bold">0</span>
        </div>

      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
